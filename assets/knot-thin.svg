<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6b658"/>
      <stop offset="50%" stop-color="#c9943a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="50%" stop-color="#e6b658"/>
      <stop offset="100%" stop-color="#c9943a"/>
    </linearGradient>
  </defs>

  <!-- RIGHT half of heart + right lobe of infinity -->
  <!-- Back layer: right heart side going up into right infinity lobe -->
  <path d="
    M 100 210
    C 120 180, 170 140, 175 100
    C 180 60, 158 28, 135 28
    C 115 28, 105 42, 100 58
  " fill="none" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- LEFT half of heart + left lobe of infinity -->
  <!-- Back layer: left heart side going up into left infinity lobe -->
  <path d="
    M 100 210
    C 80 180, 30 140, 25 100
    C 20 60, 42 28, 65 28
    C 85 28, 95 42, 100 58
  " fill="none" stroke="url(#g2)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Front crossing strand: right-to-left over the center -->
  <path d="
    M 128 52
    C 118 40, 108 44, 100 58
    C 92 44, 82 40, 72 52
  " fill="none" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Thin highlight on right side -->
  <path d="
    M 100 210
    C 120 180, 170 140, 175 100
    C 180 60, 158 28, 135 28
  " fill="none" stroke="#f5dfa0" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Thin highlight on left side -->
  <path d="
    M 100 210
    C 80 180, 30 140, 25 100
    C 20 60, 42 28, 65 28
  " fill="none" stroke="#f5dfa0" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
</svg>
